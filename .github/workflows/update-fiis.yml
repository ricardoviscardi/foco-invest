name: Atualizar FIIs

on:
  workflow_dispatch:
    inputs:
      sleep:
        description: "Pausa entre FIIs"
        required: false
        default: "1"
      publicar_snapshot:
        description: "Publicar snapshot de FIIs no repositório"
        required: false
        default: "sim"
        type: choice
        options:
          - sim
          - nao
  schedule:
    - cron: "10 1 * * 2,5"

permissions:
  contents: write

concurrency:
  group: foco-invest-snapshot-main
  cancel-in-progress: false

jobs:
  atualizar-fiis:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BRAPI_API_TOKEN: ${{ secrets.BRAPI_API_TOKEN }}
      SUPABASE_WRITE_MODE: direct
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL não configurada nos Secrets."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY não configurada nos Secrets."
            exit 1
          fi

      - name: Atualizar preços, histórico e dividendos dos FIIs
        shell: bash
        run: |
          python scripts/update_base_inicial.py --fiis --sleep ${{ inputs.sleep || '1' }}

      - name: Complementar indicadores públicos dos FIIs
        shell: bash
        run: |
          python scripts/update_fii_fundamentus.py --all --sleep ${{ inputs.sleep || '1' }}

      - name: Conferir base
        if: always()
        run: |
          python scripts/check_supabase_data.py

      - name: Exportar snapshot local de FIIs
        if: always()
        run: |
          python scripts/export_stock_snapshots.py --all-assets --output public/data/snapshots/stocks --limit-history 2600

      - name: Salvar snapshot local de FIIs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-local-fiis
          path: |
            public/data/snapshots/index.json
            public/data/snapshots/stocks/*.json
          if-no-files-found: ignore

      - name: Publicar snapshot de FIIs no repositório
        if: ${{ always() && (github.event_name == 'schedule' || inputs.publicar_snapshot == 'sim') }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -d public/data/snapshots ]; then
            echo "Nenhum snapshot encontrado para publicar."
            exit 0
          fi

          SNAPSHOT_TMP="$(mktemp -d)"
          cp -a public/data/snapshots "$SNAPSHOT_TMP/snapshots"

          for attempt in 1 2 3; do
            echo "Tentativa de publicação do snapshot: $attempt/3"
            git fetch origin main
            git reset --hard origin/main
            rm -rf public/data/snapshots
            mkdir -p public/data
            cp -a "$SNAPSHOT_TMP/snapshots" public/data/snapshots
            git add public/data/snapshots

            if git diff --cached --quiet; then
              echo "Nenhuma alteração de snapshot para publicar."
              exit 0
            fi

            git commit -m "atualiza snapshot local de FIIs"
            if git push origin HEAD:main; then
              echo "Snapshot publicado com sucesso."
              exit 0
            fi

            echo "Push recusado porque o remoto mudou. Recriando commit sobre origin/main..."
            sleep 5
          done

          echo "Não foi possível publicar o snapshot após 3 tentativas."
          exit 1

      - name: Salvar relatórios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-atualizacao-fiis
          path: |
            reports/*.json
            reports/*.csv
          if-no-files-found: ignore
