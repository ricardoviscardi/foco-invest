name: Atualizar ações

on:
  workflow_dispatch:
    inputs:
      modo:
        description: "O que atualizar?"
        required: true
        default: "completo_com_itr"
        type: choice
        options:
          - precos
          - cvm
          - completo_sem_itr
          - completo_com_itr
      sleep:
        description: "Pausa entre tickers na etapa de preços"
        required: false
        default: "1"
      anos_dfp:
        description: "Anos DFP separados por espaço"
        required: false
        default: "2025 2024 2023 2022 2021"
      anos_itr:
        description: "Anos ITR separados por espaço"
        required: false
        default: "2026 2025"
      universo:
        description: "Universo de ações"
        required: false
        default: "todas_acoes_b3"
        type: choice
        options:
          - base_ampliada
          - todas_acoes_b3
      publicar_snapshot:
        description: "Publicar snapshot no repositório para teste local sem Supabase"
        required: false
        default: "sim"
        type: choice
        options:
          - sim
          - nao

  schedule:
    - cron: "30 23 * * 1-5"

permissions:
  contents: write

concurrency:
  group: foco-invest-snapshot-main
  cancel-in-progress: false

jobs:
  atualizar-acoes:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BRAPI_API_TOKEN: ${{ secrets.BRAPI_API_TOKEN }}
      SUPABASE_WRITE_MODE: direct
      PYTHONUNBUFFERED: "1"
      CVM_RETRY_ATTEMPTS: "8"
      CVM_RETRY_BASE_SLEEP: "10"
      CVM_FORCE_IPV4: "1"

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL não configurada nos Secrets."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY não configurada nos Secrets."
            exit 1
          fi

      - name: Atualização agendada de preços
        if: ${{ github.event_name == 'schedule' }}
        run: |
          python scripts/update_base_inicial.py --b3-stocks --sleep 1

      - name: Atualizar apenas preços
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.modo == 'precos' }}
        shell: bash
        run: |
          if [ "${{ inputs.universo }}" = "todas_acoes_b3" ]; then
            python scripts/update_base_inicial.py --b3-stocks --sleep ${{ inputs.sleep }}
          else
            python scripts/update_base_inicial.py --stocks --sleep ${{ inputs.sleep }}
          fi

      - name: Atualizar apenas CVM
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.modo == 'cvm' }}
        run: |
          python scripts/update_cvm_companies.py --all --years ${{ inputs.anos_dfp }} --itr-years ${{ inputs.anos_itr }}

      - name: Atualizar completo sem ITR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.modo == 'completo_sem_itr' }}
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ inputs.universo }}" = "todas_acoes_b3" ]; then EXTRA="--b3-stocks"; fi
          python scripts/update_all_stocks_full.py --sleep ${{ inputs.sleep }} $EXTRA --years ${{ inputs.anos_dfp }} --cvm-optional

      - name: Atualizar completo com ITR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.modo == 'completo_com_itr' }}
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ inputs.universo }}" = "todas_acoes_b3" ]; then EXTRA="--b3-stocks"; fi
          python scripts/update_all_stocks_full.py --sleep ${{ inputs.sleep }} $EXTRA --with-itr --years ${{ inputs.anos_dfp }} --itr-years ${{ inputs.anos_itr }} --cvm-optional

      - name: Conferir base
        if: always()
        run: |
          python scripts/check_supabase_data.py

      - name: Exportar snapshot local de ações e FIIs
        if: ${{ success() }}
        run: |
          python scripts/export_stock_snapshots.py --all-assets --output public/data/snapshots/stocks --limit-history 2600

      - name: Validar snapshot de ações
        if: ${{ success() && github.event_name == 'workflow_dispatch' && inputs.publicar_snapshot == 'sim' }}
        run: |
          python scripts/verify_snapshot_coverage.py --ticker PETR3 --ticker PETR4 --ticker ABEV3 --ticker LREN3 --ticker RENT3 --ticker CMIG4 --ticker SUZB3 --ticker WEGE3 --ticker MGLU3 --ticker NTCO3 --ticker WIZC3 --min-annual-years 3 --min-history 200

      - name: Salvar snapshot local de ações
        if: ${{ success() || failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-local-acoes
          path: |
            public/data/snapshots/index.json
            public/data/snapshots/stocks/*.json
          if-no-files-found: ignore

      - name: Publicar snapshot no repositório
        if: ${{ success() && (github.event_name == 'schedule' || inputs.publicar_snapshot == 'sim') }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ ! -d public/data/snapshots ]; then
            echo "Nenhum snapshot encontrado para publicar."
            exit 0
          fi

          SNAPSHOT_TMP="$(mktemp -d)"
          cp -a public/data/snapshots "$SNAPSHOT_TMP/snapshots"

          for attempt in 1 2 3; do
            echo "Tentativa de publicação do snapshot: $attempt/3"
            git fetch origin main
            git reset --hard origin/main
            rm -rf public/data/snapshots
            mkdir -p public/data
            cp -a "$SNAPSHOT_TMP/snapshots" public/data/snapshots
            git add public/data/snapshots

            if git diff --cached --quiet; then
              echo "Nenhuma alteração de snapshot para publicar."
              exit 0
            fi

            git commit -m "atualiza snapshot local de ações"
            if git push origin HEAD:main; then
              echo "Snapshot publicado com sucesso."
              exit 0
            fi

            echo "Push recusado porque o remoto mudou. Recriando commit sobre origin/main..."
            sleep 5
          done

          echo "Não foi possível publicar o snapshot após 3 tentativas."
          exit 1

      - name: Salvar relatórios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-atualizacao-acoes
          path: |
            reports/*.json
            reports/*.csv
          if-no-files-found: ignore
