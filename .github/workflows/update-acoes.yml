name: Atualizar ações

on:
  workflow_dispatch:
    inputs:
      modo:
        description: "O que atualizar?"
        required: true
        default: "completo_sem_itr"
        type: choice
        options:
          - precos
          - cvm
          - completo_sem_itr
          - completo_com_itr
      sleep:
        description: "Pausa entre tickers na etapa de preços"
        required: false
        default: "1"
      anos_dfp:
        description: "Anos DFP separados por espaço"
        required: false
        default: "2024 2023 2022 2021"
      anos_itr:
        description: "Anos ITR separados por espaço"
        required: false
        default: "2025 2024"

  schedule:
    - cron: "30 23 * * 1-5"

jobs:
  atualizar-acoes:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BRAPI_API_TOKEN: ${{ secrets.BRAPI_API_TOKEN }}
      SUPABASE_WRITE_MODE: direct
      PYTHONUNBUFFERED: "1"
      CVM_RETRY_ATTEMPTS: "8"
      CVM_RETRY_BASE_SLEEP: "10"
      CVM_FORCE_IPV4: "1"

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validar secrets
        shell: bash
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL não configurada nos Secrets."
            exit 1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "SUPABASE_SERVICE_ROLE_KEY não configurada nos Secrets."
            exit 1
          fi

      - name: Atualização agendada de preços
        if: ${{ github.event_name == 'schedule' }}
        run: |
          python scripts/update_base_inicial.py --stocks --sleep 1

      - name: Atualizar apenas preços
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.modo == 'precos' }}
        run: |
          python scripts/update_base_inicial.py --stocks --sleep ${{ inputs.sleep }}

      - name: Atualizar apenas CVM
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.modo == 'cvm' }}
        run: |
          python scripts/update_cvm_companies.py --all --years ${{ inputs.anos_dfp }} --itr-years ${{ inputs.anos_itr }}

      - name: Atualizar completo sem ITR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.modo == 'completo_sem_itr' }}
        run: |
          python scripts/update_all_stocks_full.py --sleep ${{ inputs.sleep }} --years ${{ inputs.anos_dfp }}

      - name: Atualizar completo com ITR
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.modo == 'completo_com_itr' }}
        run: |
          python scripts/update_all_stocks_full.py --sleep ${{ inputs.sleep }} --with-itr --years ${{ inputs.anos_dfp }} --itr-years ${{ inputs.anos_itr }}

      - name: Conferir base
        if: always()
        run: |
          python scripts/check_supabase_data.py

      - name: Salvar relatórios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorios-atualizacao-acoes
          path: |
            reports/*.json
            reports/*.csv
          if-no-files-found: ignore
