name: Atualizar fundamentos CVM semanal

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * 0"

jobs:
  atualizar-cvm:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_WRITE_MODE: direct
      PYTHONUNBUFFERED: "1"
      CVM_RETRY_ATTEMPTS: "8"
      CVM_RETRY_BASE_SLEEP: "10"

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Atualizar cadastro e fundamentos CVM
        run: |
          python scripts/update_cvm_companies.py --all --years 2024 2023 2022 2021 --itr-years 2025 2024

      - name: Conferir base
        if: always()
        run: |
          python scripts/check_supabase_data.py
