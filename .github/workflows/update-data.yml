name: Update Foco Invest data

on:
  workflow_dispatch:
    inputs:
      run_cvm:
        description: "Rodar também cadastro/fundamentos CVM?"
        required: false
        default: "false"
  schedule:
    - cron: "30 22 * * 1-5"

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Update prices and dividends
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/update_base_inicial.py --all --sleep 1
      - name: Update CVM cadastro and fundamentals
        if: ${{ github.event.inputs.run_cvm == 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/update_cvm_companies.py --all --years 2025 2024 2023 2022 2021 --itr-years 2026 2025
